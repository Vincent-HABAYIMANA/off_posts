name: offline_posts_manager
description: Offline Posts Manager with SQLite - Flutter Lab 5
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0          # SQLite local database
  path: ^1.8.3              # Path utilities for database location
  path_provider: ^2.1.1     # Access device filesystem paths
  intl: ^0.19.0             # Date/time formatting
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
